function searchPlayer(){
 let q=document.getElementById('search').value.toLowerCase();
 let p=players.find(x=>x.name.toLowerCase().includes(q));
 if(!p){document.getElementById('player').innerHTML='';return;}

 let rows=p.results.map(r=>`
 <tr>
 <td>${r.match}</td>
 <td>${r.fixture}</td>
 <td class="${r.points==2?'good':(r.points==1?'draw':'bad')}">${r.status}</td>
 <td>${r.points}</td>
 </tr>`).join('');

 document.getElementById('player').innerHTML=`
 <div class="card">
 <h2>${p.name}</h2>
 <h3>Total Goals: ${p.total}</h3>
 <canvas id="chart"></canvas>
 </div>
 <div class="card">
 <table>
 <tr><th>Match</th><th>Fixture</th><th>Result</th><th>Points</th></tr>
 ${rows}
 </table>
 </div>`;

 new Chart(document.getElementById('chart'),{
 type:'doughnut',
 data:{
 labels:['Correct','Draw Bonus','Wrong'],
 datasets:[{data:[p.correct,p.draw,p.wrong]}]
 }
 });
}
